name: issue opened
on:
  issues:
    types: [opened, edited, deleted, closed]

jobs:
  issue-opened:
    name: issue opened
    runs-on: ubuntu-latest
    steps:
      # - name: display github context
      #   run: |
      #       echo "${{ toJson(github) }}"
      #       echo "${{ toJson(runner) }}"
      - name: issue opened
        if: ${{ github.event.action == 'opened'}}
        run: echo "issue opened"

  issue-updated:
    name: issue updated
    runs-on: ubuntu-latest
    steps:    
      - name: issue updated
        if: ${{ github.event.action == 'updated'}}
        run: echo "issue updated"
  
  issue-closed:
    name: issue closed
    runs-on: ubuntu-latest
    steps:
      - name: issue closed
        if: ${{ github.event.action == 'closed' }}
        run: echo "issue closed"
  
  issue-deleted:
    name: issue deleted
    runs-on: ubuntu-latest
    steps:
      - name: issue deleted
        if: ${{ github.event.action == 'deleted' }}
        run: echo "issue deleted"